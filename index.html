<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAIPER 경쟁사 조사 — 탐색</title>
<style>
:root{--sky:#00befa;--ink:#16181d;--bg:#f4f6f8;--line:#e3e7ec;--mut:#6a6e77}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Pretendard',-apple-system,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
a{color:inherit}
header{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:18px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
header .logo{font-weight:800;font-size:16px}header .logo b{color:var(--sky)}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;border:none;color:#c7cbd1;font-weight:700;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer}
nav button.on{background:var(--sky);color:#06222b}
nav button:hover:not(.on){background:#262a31;color:#fff}
main{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
h2.sec{font-size:20px;font-weight:800;margin:4px 0 4px}h2.sec b{color:var(--sky)}
.sub{color:var(--mut);font-size:13px;margin-bottom:16px}
.grid{display:grid;gap:13px}
.gb{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.gp{grid-template-columns:repeat(auto-fill,minmax(215px,1fr))}
.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;cursor:pointer;transition:.13s;position:relative}
.card:hover{border-color:var(--sky);box-shadow:0 6px 20px rgba(0,190,250,.13);transform:translateY(-2px)}
.card .en{font-size:10.5px;color:var(--sky);font-weight:800;letter-spacing:.5px}
.card .ti{font-size:17px;font-weight:800;margin:1px 0 4px}
.card .ty{font-size:12px;color:var(--mut);min-height:32px}
.card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.tag{font-size:10.5px;background:#eef1f4;color:#41464e;border-radius:20px;padding:3px 9px;font-weight:600;white-space:nowrap}
.tag.sky{background:#e1f6ff;color:#0089b8}
.tag.ink{background:var(--ink);color:#fff}
.badge{position:absolute;top:13px;right:14px;font-size:11px;font-weight:800;color:var(--sky)}
/* 관계도 */
#relwrap{position:relative;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 8px;overflow:hidden}
#rsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.relcols{position:relative;display:flex;justify-content:space-between;z-index:2}
.relcol{display:flex;flex-direction:column;gap:9px;width:44%}
.relcol .h{font-size:12px;font-weight:800;color:var(--mut);text-align:center;margin-bottom:3px}
.node{background:#f2f4f7;border:1.5px solid #dfe3e8;border-radius:9px;padding:9px 11px;font-weight:700;font-size:13px;cursor:pointer;transition:.12s;text-align:center}
.node:hover,.node.hot{background:var(--sky);border-color:var(--sky);color:#06222b}
.node.fac{font-size:12px}.node.major{border-color:#9aa0a8}
.node small{display:block;font-size:9.5px;color:var(--mut);font-weight:500}
.node:hover small,.node.hot small{color:#06343f}
/* 필터 */
.filters{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.frow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:5px 0}
.frow .lab{font-size:11px;font-weight:800;color:var(--mut);width:54px}
.chip{font-size:11.5px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 11px;cursor:pointer;font-weight:600}
.chip.on{background:var(--sky);border-color:var(--sky);color:#06222b}
.chip:hover:not(.on){border-color:var(--sky)}
#searchbox{flex:1;min-width:140px;border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12.5px;outline:none}
.count{font-size:12px;color:var(--mut);margin:4px 2px 12px}
/* product card */
.pc{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;transition:.12s}
.pc:hover{border-color:var(--sky);box-shadow:0 4px 14px rgba(0,190,250,.12)}
.pc .pcat{font-size:10px;font-weight:800;color:var(--sky)}
.pc .pmo{font-size:13.5px;font-weight:800;margin:2px 0 3px;line-height:1.25}
.pc .peq{font-size:11px;color:var(--mut);min-height:14px}
.pc .prow{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10.5px}
/* drawer */
#ov{position:fixed;inset:0;background:rgba(10,12,15,.45);z-index:40;display:none;backdrop-filter:blur(2px)}
#dw{position:fixed;top:0;right:0;height:100%;width:min(560px,94vw);background:#fff;z-index:50;transform:translateX(102%);transition:.26s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.2)}
#dw.open{transform:none}
.dwh{position:sticky;top:0;background:var(--ink);color:#fff;padding:15px 18px;display:flex;align-items:center;gap:11px;z-index:2}
.dwh .bk{background:#2a2e35;border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;flex:0 0 auto}
.dwh .bk:hover{background:var(--sky);color:#06222b}
.dwh .x{margin-left:auto;background:transparent;border:none;color:#aeb3ba;font-size:22px;cursor:pointer}
.dwh .x:hover{color:#fff}
.dwh .en{font-size:10px;color:var(--sky);font-weight:800}
.dwh .ti{font-size:18px;font-weight:800}
.dwb{padding:18px}
.dwb h4{font-size:12px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
.dwb h4:first-child{margin-top:0}
.kv{display:flex;font-size:13px;margin:5px 0}.kv .k{width:96px;color:var(--mut);flex:0 0 auto}.kv .v{font-weight:600}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{font-size:12px;border:1px solid var(--line);background:#f7f8fa;border-radius:8px;padding:6px 11px;cursor:pointer;font-weight:700}
.cbtn:hover{border-color:var(--sky);background:#e1f6ff}
.cbtn.lock{cursor:default;background:#eef1f4}.cbtn.lock:hover{border-color:var(--line);background:#eef1f4}
.reptbl{width:100%;border-collapse:collapse;font-size:12px}
.reptbl td{border:1px solid var(--line);padding:6px 8px}.reptbl td:first-child{font-weight:700;background:#f7f8fa}
.plist .pli{display:flex;gap:8px;align-items:center;padding:7px 9px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:12px}
.plist .pli:hover{border-color:var(--sky);background:#f6fdff}
.plist .pli .d{color:var(--mut);font-size:10.5px;width:64px;flex:0 0 auto}
.plist .pli .m{font-weight:700;flex:1}
.plist .pli .f{font-size:10.5px;color:#0089b8;font-weight:700}
.note{font-size:11.5px;color:#7a6a45;background:#fffaf0;border:1px solid #ffe2b0;border-radius:8px;padding:9px 12px;margin-top:12px;line-height:1.55}
.foldbtn{font-size:12px;color:var(--sky);font-weight:800;cursor:pointer;user-select:none;margin-top:4px}
@media(max-width:560px){.relcol{width:46%}.dwb{padding:14px}}
</style></head><body>
<header>
  <div class="logo"><b>KAIPER</b> 경쟁사 조사</div>
  <nav id="nav">
    <button data-t="rel" class="on">🔗 관계도</button>
    <button data-t="brand">🏷️ 브랜드</button>
    <button data-t="fac">🏭 제조사</button>
    <button data-t="gallery">🗂️ 제품 갤러리</button>
  </nav>
</header>
<main id="app"></main>
<div id="ov" onclick="closeDw()"></div>
<aside id="dw"><div id="dwh" class="dwh"></div><div id="dwb" class="dwb"></div></aside>

    });
  });
  wrap.querySelectorAll('[data-b]').forEach(n=>{n.onmouseenter=()=>hl('b',n.dataset.b);n.onmouseleave=clr;});
  wrap.querySelectorAll('[data-f]').forEach(n=>{n.onmouseenter=()=>hl('f',n.dataset.f);n.onmouseleave=clr;});
}
function hl(t,v){const svg=document.getElementById('rsvg');const wrap=document.getElementById('relwrap');
  svg.querySelectorAll('path').forEach(p=>{const m=p.dataset[t]===v;p.setAttribute('opacity',m?'.95':'.07');p.setAttribute('stroke-width',m?(+p.dataset.w+0.8):p.dataset.w);
    if(m){wrap.querySelector(`[data-${t==='b'?'f':'b'}="${p.dataset[t==='b'?'f':'b']}"]`)?.classList.add('hot');}});}
function clr(){const svg=document.getElementById('rsvg');svg.querySelectorAll('path').forEach(p=>{p.setAttribute('opacity','.5');p.setAttribute('stroke-width',p.dataset.w);});
  document.querySelectorAll('.node.hot').forEach(n=>n.classList.remove('hot'));}
window.addEventListener('resize',()=>{if(curTab==='rel')drawLines(_ed);});

/* ---------- 브랜드 그리드 ---------- */
function renderBrands(){
  app.innerHTML=`<h2 class="sec"><b>브랜드</b> 7곳</h2><div class="sub">카드를 누르면 제품군·폼팩터·공장·제품 리스트가 열려요. 한 번 더 들어가면 제품 상세까지.</div>
   <div class="grid gb">${brand_order.map(b=>{const bd=brands[b];const cats=Object.keys(brandCats(b));
     return `<div class="card" onclick="openBrand('${b}')"><div class="badge">${bd.rraN}건</div>
       <div class="en">${bd.en}</div><div class="ti">${b}</div><div class="ty">${bd.type}</div>
       <div class="meta">${cats.slice(0,4).map(c=>`<span class="tag sky">${c}</span>`).join('')}${cats.length>4?`<span class="tag">+${cats.length-4}</span>`:''}</div></div>`;}).join('')}</div>`;
}
/* ---------- 제조사 그리드 ---------- */
function renderFacs(){
  app.innerHTML=`<h2 class="sec"><b>제조사</b> ${fac_order.length}곳</h2><div class="sub">이름을 누르면 만든 브랜드·제품군이 열리고, 회사 정보까지 펼쳐볼 수 있어요.</div>
   <div class="grid gb">${fac_order.map(f=>{const fd=facs[f];const bs=Object.keys(facBrands(f));
     return `<div class="card" onclick="openFac('${f}')"><div class="badge">${Object.values(facBrands(f)).reduce((a,b)=>a+b,0)}건</div>
       <div class="en">${fd.loc} · ${fd.since}</div><div class="ti">${f}</div><div class="ty">${fd.spec}</div>
       <div class="meta"><span class="tag ${fd.listed.includes('상장')?'ink':''}">${fd.listed.includes('상장')?'상장':'비상장'}</span>${bs.slice(0,3).map(b=>`<span class="tag">${b}</span>`).join('')}</div></div>`;}).join('')}</div>`;
}

/* ---------- Drawer (스택) ---------- */
let stack=[];
function pushDw(html_head,html_body){stack.push({h:html_head,b:html_body});paint();}
function paint(){const cur=stack[stack.length-1];
  document.getElementById('dwh').innerHTML=`${stack.length>1?`<button class="bk" onclick="popDw()">‹</button>`:''}<div>${cur.h}</div><button class="x" onclick="closeDw()">×</button>`;
  document.getElementById('dwb').innerHTML=cur.b;
  document.getElementById('dw').classList.add('open');document.getElementById('ov').style.display='block';}
function popDw(){stack.pop();paint();}
function closeDw(){document.getElementById('dw').classList.remove('open');document.getElementById('ov').style.display='none';stack=[];}
function newDw(h,b){stack=[];pushDw(h,b);}

/* 브랜드 상세 */
function openBrand(b){const bd=brands[b];const cats=brandCats(b),fcs=brandFacs(b);
  const head=`<div class="en">${bd.en}</div><div class="ti">${b}</div>`;
  let body=`<div class="kv"><span class="k">한국 법인</span><span class="v">${bd.corp}</span></div>
   <div class="kv"><span class="k">정체</span><span class="v">${bd.type}</span></div>
   <div class="kv"><span class="k">RRA 본체</span><span class="v">${bd.rraN}건 (2024~2026)</span></div>
   <p style="font-size:12.5px;color:#41464e;margin-top:8px">${bd.desc}</p>
   <h4>제품군</h4><div class="chips">${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<span class="cbtn lock" style="border-left:3px solid ${catColor[c]}">${c} <b style="color:${catColor[c]}">${n}</b></span>`).join('')}</div>
   <h4>선풍기/팬 폼팩터</h4><div class="chips">${bd.forms.map(f=>`<span class="cbtn lock">${f}</span>`).join('')}</div>
   <h4>제조 공장 (누르면 공장 상세)</h4><div class="chips">${Object.entries(fcs).sort((a,b)=>b[1]-a[1]).map(([f,n])=>facs[f]?`<span class="cbtn" onclick="openFac('${f}')">${f} <b>${n}</b> ›</span>`:`<span class="cbtn lock">${f} ${n}</span>`).join('')}</div>
   <h4>대표 제품 (시장 정보)</h4><table class="reptbl"><tr><td>모델</td><td>형태</td><td>가격</td><td>판매지표</td></tr>${bd.rep.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</table>
   <h4>전체 제품 ${bd.rraN}건 — 누르면 상세</h4><div class="plist">${prods.map((p,i)=>[p,i]).filter(([p])=>p.brand===b).map(([p,i])=>`<div class="pli" onclick="openProd(${i})"><span class="d">${p.date}</span><span class="m">${p.model}</span><span class="f">${p.maker}</span></div>`).join('')}</div>`;
  newDw(head,body);
}
/* 제조사 상세 */
function openFac(f){const fd=facs[f]||{full:f,loc:'중국',since:'확인 불가',scale:'확인 불가',listed:'비상장',cert:'—',spec:'공개 프로필 미상',note:'RRA 인증서에 제조자로 등장. 공개 기업 프로필 미확보(소규모/비공개 추정).'};const bs=facBrands(f),cs=facCats(f);
  const head=`<div class="en">제조사 · ${fd.loc}</div><div class="ti">${f}</div>`;
  let body=`<p style="font-size:12.5px;color:#41464e">${fd.spec}</p>
   <h4>공급한 한국 브랜드 (RRA 확인 · 누르면 브랜드 상세)</h4><div class="chips">${Object.entries(bs).sort((a,b)=>b[1]-a[1]).map(([b,n])=>brands[b]?`<span class="cbtn" onclick="openBrand('${b}')">${b} <b>${n}</b> ›</span>`:`<span class="cbtn lock">${b} ${n}</span>`).join('')}</div>
   <h4>이 공장이 만든 제품군</h4><div class="chips">${Object.entries(cs).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<span class="cbtn lock" style="border-left:3px solid ${catColor[c]||'#ccc'}">${c} <b>${n}</b></span>`).join('')}</div>
   ${fac_clients[f]?`<h4>알려진 거래처(본 조사 외 포함)</h4><div class="chips">${fac_clients[f].map(c=>`<span class="cbtn lock">${c}</span>`).join('')}</div>`:''}
   <h4>회사 정보</h4>
   <div class="kv"><span class="k">정식명</span><span class="v">${fd.full}</span></div>
   <div class="kv"><span class="k">소재지</span><span class="v">${fd.loc}</span></div>
   <div class="kv"><span class="k">설립</span><span class="v">${fd.since}</span></div>
   <div class="kv"><span class="k">규모</span><span class="v">${fd.scale}</span></div>
   <div class="kv"><span class="k">상장</span><span class="v">${fd.listed}</span></div>
   <div class="kv"><span class="k">인증</span><span class="v">${fd.cert}</span></div>
   <div class="kv"><span class="k">특화</span><span class="v">${fd.spec}</span></div>
   ${fd.note?`<div class="note">${fd.note}</div>`:''}
   <h4>이 공장의 제품 ${Object.values(bs).reduce((a,b)=>a+b,0)}건</h4><div class="plist">${prods.map((p,i)=>[p,i]).filter(([p])=>p.maker===f).map(([p,i])=>`<div class="pli" onclick="openProd(${i})"><span class="d">${p.date}</span><span class="m">${p.model}</span><span class="f">${p.brand}</span></div>`).join('')}</div>`;
  newDw(head,body);
}
/* 제품 상세 */
function openProd(i){const p=prods[i];
  const head=`<div class="en">${p.brand} · ${p.cat}</div><div class="ti" style="font-size:15px">${p.model}</div>`;
  let body=`<table class="reptbl">
   <tr><td>브랜드</td><td>${p.brand}</td></tr>
   <tr><td>기기명칭</td><td>${p.equip}</td></tr>
   <tr><td>모델명</td><td>${p.model}</td></tr>
   <tr><td>제품군</td><td><span style="color:${catColor[p.cat]};font-weight:800">${p.cat}</span></td></tr>
   <tr><td>인증일</td><td>${p.date}</td></tr>
   <tr><td>제조사</td><td><b>${p.maker}</b>${facs[p.maker]?' ›':''}</td></tr>
   <tr><td>제조국</td><td>${p.country}</td></tr>
   <tr><td>파생모델</td><td>${p.deriv?'있음 (색상·사양 변형 SKU)':'없음'}</td></tr>
   <tr><td>인증번호</td><td style="font-size:11px">${p.rr}</td></tr>
   </table>
   <div class="chips" style="margin-top:14px"><span class="cbtn" onclick="openBrand('${p.brand}')">🏷️ ${p.brand} 브랜드 ›</span>${facs[p.maker]?`<span class="cbtn" onclick="openFac('${p.maker}')">🏭 ${p.maker} 제조사 ›</span>`:''}</div>`;
  pushDw(head,body);
}

/* ---------- 제품 갤러리 (태그 필터) ---------- */
let flt={brand:null,cat:null,maker:null,year:null,q:''};
function renderGallery(){
  const cats=[...new Set(prods.map(p=>p.cat))];
  const makers=[...new Set(prods.map(p=>p.maker))].filter(m=>prods.filter(p=>p.maker===m).length>=2);
  const years=['2024','2025','2026'];
  app.innerHTML=`<h2 class="sec"><b>제품 갤러리</b> · 145건</h2><div class="sub">태그를 눌러 브랜드·제품군·제조사·연도로 좁혀 보세요. 카드를 누르면 상세.</div>
   <div class="filters">
     <div class="frow"><span class="lab">검색</span><input id="searchbox" placeholder="모델·기기명 검색" oninput="flt.q=this.value;paintG()"></div>
     <div class="frow"><span class="lab">브랜드</span>${brand_order.map(b=>`<span class="chip" data-k="brand" data-v="${b}">${b}</span>`).join('')}</div>
     <div class="frow"><span class="lab">제품군</span>${cats.map(c=>`<span class="chip" data-k="cat" data-v="${c}">${c}</span>`).join('')}</div>
     <div class="frow"><span class="lab">제조사</span>${makers.map(m=>`<span class="chip" data-k="maker" data-v="${m}">${m}</span>`).join('')}</div>
     <div class="frow"><span class="lab">연도</span>${years.map(y=>`<span class="chip" data-k="year" data-v="${y}">${y}</span>`).join('')}</div>
   </div>
   <div class="count" id="gcount"></div><div class="grid gp" id="ggrid"></div>`;
  app.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{const k=ch.dataset.k,v=ch.dataset.v;
    flt[k]=flt[k]===v?null:v;app.querySelectorAll(`.chip[data-k="${k}"]`).forEach(c=>c.classList.toggle('on',c.dataset.v===flt[k]));paintG();});
  paintG();
}
function paintG(){
  let list=prods.map((p,i)=>[p,i]).filter(([p])=>(!flt.brand||p.brand===flt.brand)&&(!flt.cat||p.cat===flt.cat)&&(!flt.maker||p.maker===flt.maker)&&(!flt.year||p.year===flt.year)&&(!flt.q||(p.model+p.equip).toLowerCase().includes(flt.q.toLowerCase())));
  document.getElementById('gcount').textContent=`${list.length}건 표시`;
  document.getElementById('ggrid').innerHTML=list.map(([p,i])=>`<div class="pc" onclick="openProd(${i})">
    <div class="pcat" style="color:${catColor[p.cat]}">${p.cat}</div>
    <div class="pmo">${p.model}</div><div class="peq">${p.equip}</div>
    <div class="prow"><span class="tag">${p.brand}</span><span style="color:#0089b8;font-weight:700">${p.maker}</span></div>
    <div class="prow" style="margin-top:3px;color:#9097a0"><span>${p.date}</span>${p.deriv?'<span>파생 SKU</span>':'<span></span>'}</div></div>`).join('');
}
render();
</script></body></html>
